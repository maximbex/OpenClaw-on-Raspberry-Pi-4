---
# ---------------------------------------------------------
# IDENTITY & SECURITY
# ---------------------------------------------------------
openclaw_user: openclaw
openclaw_group: openclaw
openclaw_home: /home/openclaw

# ---------------------------------------------------------
# THE SYNAPTIC BRIDGE (NFS Topology)
# ---------------------------------------------------------
nas_host: "192.168.1.100" # Replace with your Synology NAS IP
nfs_export_path: "/volume1/openclaw-data" # The path on your NAS
nfs_mount_point: "{{ openclaw_home }}/data"

# Removed unbound uid/gid variables; ownership is asserted via the filesystem tasks
nfs_mount_opts: "rw,hard,intr,nconnect=16,rsize=1048576,wsize=1048576,timeo=600,retrans=2"

# ---------------------------------------------------------
# THE FOLD (Mathematical RAM Expansion)
# ---------------------------------------------------------
zram_percent: 75
zram_algo: zstd

# ---------------------------------------------------------
# THE COGNITIVE ENGINE
# ---------------------------------------------------------
node_version: "24.x" # Upgraded to current OpenClaw baseline
openclaw_npm_package: "openclaw@latest"
