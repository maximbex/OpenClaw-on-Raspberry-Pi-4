---
- name: Comprehensive Pi 4 + OpenClaw + NFS Health
  hosts: pi_openclaw
  become: true

  tasks:
    - name: Read temperature
      command: vcgencmd measure_temp
      register: temp
      changed_when: false

    - name: Read throttling status
      command: vcgencmd get_throttled
      register: throttled
      changed_when: false

    - name: Check ZRAM status
      command: zramctl --output-all
      register: zram_status
      changed_when: false
      failed_when: false

    - name: Check memory availability
      command: free -h
      register: memory
      changed_when: false

    - name: Check NFS mount
      command: findmnt {{ nfs_mount_point }}
      register: nfs_mounted
      changed_when: false
      failed_when: false

    - name: Check OpenClaw process
      command: pgrep -f "node.*openclaw"
      register: openclaw_pid
      changed_when: false
      failed_when: false

    - name: Print crystalline summary
      debug:
        msg:
          - "╔════════════════════════════════════════════════════════════╗"
          - "║  PI 4 HARDWARE STATE                                       ║"
          - "╠════════════════════════════════════════════════════════════╣"
          - "║  Temperature:  {{ temp.stdout | default('n/a') | regex_replace('temp=', '') | regex_replace(\"'C\", '°C') }}"
          - "║  Throttling:   {{ 'YES - CHECK COOLING' if 'throttled=0x0' not in throttled.stdout else 'None' }}"
          - "╠════════════════════════════════════════════════════════════╣"
          - "║  MEMORY ARCHITECTURE                                       ║"
          - "╠════════════════════════════════════════════════════════════╣"
          - "║  {{ memory.stdout.split('\n') | join('\n║  ') }}"
          - "║  ZRAM: {{ zram_status.stdout_lines[1] | default('Not active') if zram_status.stdout else 'Not active' }}"
          - "╠════════════════════════════════════════════════════════════╣"
          - "║  NFS BRIDGE STATUS                                         ║"
          - "╠════════════════════════════════════════════════════════════╣"
          - "║  Mount:     {{ '✓ Connected' if nfs_mounted.rc == 0 else '✗ Disconnected' }}"
          - "╠════════════════════════════════════════════════════════════╣"
          - "║  OPENCLAW GATEWAY                                          ║"
          - "╠════════════════════════════════════════════════════════════╣"
          - "║  Process:   {{ '✓ Running' if openclaw_pid.rc == 0 else '✗ Not running' }}"
          - "╚════════════════════════════════════════════════════════════╝"
